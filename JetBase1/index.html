<!DOCTYPE html>
<html>
<head>
  <title>Jetbase</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🌍 BACKGROUND -->
<div class="bg"></div>
<div class="overlay"></div>

<h1>JETBASE</h1>
<p>Search any aircraft</p>

<input id="searchBox" placeholder="Boeing 737, A320..." onkeyup="showSuggestions()">
<button onclick="goSearch()">Search</button>

<div id="suggestions"></div>
<div id="preview"></div>

<br>

<button onclick="location.href='aircraft.html'">
✈ Compare Aircraft
</button>

<button onclick="location.href='airline.html'">
  🛫 Compare Airlines
</button>

<!-- NEWS -->
<div class="news">

  <h2>📰 Aviation News</h2>

  <div class="news-item">
    <a href="https://www.boeing.com/commercial" target="_blank">
      Boeing commercial aircraft updates
    </a>
  </div>

  <div class="news-item">
    <a href="https://www.airbus.com/en/newsroom" target="_blank">
      Airbus official news room
    </a>
  </div>

  <div class="news-item">
    <a href="https://simpleflying.com" target="_blank">
      Simple Flying aviation news
    </a>
  </div>

  <div class="news-item">
    <a href="https://www.flightglobal.com/news" target="_blank">
      FlightGlobal aviation news
    </a>
  </div>

  <div class="news-item">
    <a href="https://www.reuters.com/business/aerospace-defense/" target="_blank">
      Reuters aerospace & aviation news
    </a>
  </div>

</div>

<script>

const previewData = {
  "Boeing 737": {img:"images/737.jpg",cap:189,range:6570},
  "Airbus A320": {img:"images/a320.jpg",cap:180,range:6300},
  "Boeing 787 Dreamliner": {img:"images/b787.jpg",cap:330,range:14100},
  "Boeing 777": {img:"images/777.jpg",cap:396,range:15600},
  "Airbus A350": {img:"images/a350.jpg",cap:350,range:15000},
  "Airbus A380": {img:"images/a380.jpg",cap:850,range:15200}
};

const aircraftList=Object.keys(previewData);

/* SEARCH */
function goSearch(){
  const val=document.getElementById("searchBox").value.toLowerCase();

  if(val.includes("737")) location.href="aircraft.html?name=boeing737";
  else if(val.includes("320")) location.href="aircraft.html?name=a320";
  else if(val.includes("220")) location.href="aircraft.html?name=a220";
  else if(val.includes("190")) location.href="aircraft.html?name=embraer190";
  else if(val.includes("atr")) location.href="aircraft.html?name=atr72";

  else if(val.includes("max")) location.href="aircraft.html?name=boeing737max";
  else if(val.includes("321")) location.href="aircraft.html?name=a321neo";
  else if(val.includes("195")) location.href="aircraft.html?name=embraer195";

  else if(val.includes("787")) location.href="aircraft.html?name=boeing787";
  else if(val.includes("330")) location.href="aircraft.html?name=a330";
  else if(val.includes("767")) location.href="aircraft.html?name=boeing767";

  else if(val.includes("777")) location.href="aircraft.html?name=boeing777";
  else if(val.includes("350")) location.href="aircraft.html?name=a350";
  else if(val.includes("747")) location.href="aircraft.html?name=boeing747";

  else if(val.includes("380")) location.href="aircraft.html?name=a380";

  else if(val.includes("g650")) location.href="aircraft.html?name=g650";
  else if(val.includes("pheno") || val.includes("300")) location.href="aircraft.html?name=phenom300";

  else if(val.includes("c172")) location.href="aircraft.html?name=c172";

  else if(val.includes("black")) location.href="aircraft.html?name=uh60";
  else if(val.includes("apache")) location.href="aircraft.html?name=ah64";
  else if(val.includes("chinook")) location.href="aircraft.html?name=ch47";

  else if(val.includes("c130")) location.href="aircraft.html?name=c130";

  else if(val.includes("f16")) location.href="aircraft.html?name=f16";
  else if(val.includes("f22")) location.href="aircraft.html?name=f22";
  else if(val.includes("f35")) location.href="aircraft.html?name=f35";

  else if(val.includes("concorde")) location.href="aircraft.html?name=concorde";

  else if(val.includes("g700")) location.href="aircraft.html?name=g700";
  else if(val.includes("7500")) location.href="aircraft.html?name=global7500";

  else alert("Aircraft not found");
}

/* AUTOCOMPLETE + PREVIEW */
function showSuggestions(){

  const input=document.getElementById("searchBox").value.toLowerCase();
  const box=document.getElementById("suggestions");
  const prev=document.getElementById("preview");

  box.innerHTML="";

  if(input.length===0){
    prev.classList.remove("show");
    return;
  }

  aircraftList
  .filter(a=>a.toLowerCase().includes(input))
  .forEach(item=>{

    const div=document.createElement("div");
    div.innerHTML=item;
    div.style.padding="10px";
    div.style.cursor="pointer";

    div.onclick=()=>{
      document.getElementById("searchBox").value=item;
      box.innerHTML="";
    };

    div.onmouseover=()=>{
      const p=previewData[item];
      if(!p) return;

      prev.innerHTML=`
        <img src="${p.img}">
        <h3>${item}</h3>
        <p>Capacity: ${p.cap}</p>
        <p>Range: ${p.range} km</p>
      `;

      prev.classList.add("show");
    };

    box.appendChild(div);
  });
}

</script>

</body>
</html>
