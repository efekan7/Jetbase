<!DOCTYPE html>
<html>
<head>
  <title>Jetbase Aircraft</title>

  <style>
    body{
      font-family:Arial;
      background: url("images/sky.jpg") no-repeat center center fixed;
      background-size: cover;
      color:white;
      margin:0;
      padding:20px;
    }

    h1{color:#38bdf8;}

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:rgba(30,41,59,0.8);
      padding:10px;
      border-radius:10px;
      margin-bottom:15px;
      backdrop-filter: blur(8px);
    }

    .topbar button{
      background:#38bdf8;
      border:none;
      padding:8px 12px;
      border-radius:6px;
      font-weight:bold;
      cursor:pointer;
      color:black;
    }

    select,button{
      padding:8px;
      margin:5px;
      border-radius:6px;
      border:none;
    }

    .compareBtn{
      background:#38bdf8;
      font-weight:bold;
      cursor:pointer;
      color:black;
    }

    .box, .card{
      background:rgba(30,41,59,0.8);
      backdrop-filter: blur(8px);
      padding:15px;
      border-radius:10px;
    }

    .box img, .card img{
      width:100%;
      max-width:320px;
      height:180px;
      object-fit:cover;
      border-radius:10px;
      display:block;
      margin:0 auto 10px auto;
    }

    .compare{
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:15px;
    }

    .card{
      min-width:240px;
      max-width:300px;
      text-align:center;
    }

    .bar{
      height:10px;
      background:#334155;
      border-radius:6px;
      margin:6px 0;
      overflow:hidden;
    }

    .green{background:#22c55e;height:10px;}
    .red{background:#ef4444;height:10px;}
    .yellow{background:#facc15;height:10px;}

    .aiBox{
      margin-top:20px;
      background:rgba(15,23,42,0.7);
      border:1px solid #334155;
      padding:15px;
      border-radius:10px;
      backdrop-filter: blur(8px);
      white-space:pre-line;
    }
  </style>
</head>

<body>

<div class="topbar">
  <button onclick="location.href='index.html'">Home</button>
  <div>✈ Aircraft System</div>
</div>

<h1>Aircraft Compare</h1>

<!-- CATEGORY -->
<select id="categoryFilter" onchange="filterCategory()">
  <option value="all">All</option>
  <option value="jet">Jet</option>
  <option value="cargo">Cargo</option>
  <option value="helicopter">Helicopter</option>
  <option value="private">Private</option>
  <option value="small">Small</option>
  <option value="military">Military</option>
</select>

<br>

<select id="a1"></select>
<select id="a2"></select>

<button class="compareBtn" onclick="compare()">Compare</button>

<div id="detail"></div>
<div id="result"></div>
<div class="aiBox" id="aiBox"></div>

<script>

/* ✈️ FULL DATA */
const data = {

/* REGIONAL JETS */
boeing737:{name:"Boeing 737",img:"images/737.jpg",capacity:189,range:6570,fuel:2600,category:"jet"},
a320:{name:"Airbus A320",img:"images/a320.jpg",capacity:180,range:6300,fuel:2400,category:"jet"},
a220:{name:"Airbus A220",img:"images/a220.jpg",capacity:130,range:6300,fuel:2000,category:"jet"},
embraer190:{name:"Embraer E190",img:"images/e190.jpg",capacity:114,range:4500,fuel:1800,category:"jet"},
embraer195:{name:"Embraer E195",img:"images/e195.jpg",capacity:132,range:4800,fuel:1900,category:"jet"},
atr72:{name:"ATR 72",img:"images/atr72.jpg",capacity:78,range:1500,fuel:1000,category:"jet"},

/* NARROW BODY */
boeing737max:{name:"Boeing 737 MAX",img:"images/737max.jpg",capacity:210,range:6570,fuel:2400,category:"jet"},
a321neo:{name:"Airbus A321neo",img:"images/a321.jpg",capacity:220,range:7400,fuel:2800,category:"jet"},

/* WIDE BODY */
boeing787:{name:"Boeing 787",img:"images/b787.jpg",capacity:330,range:14100,fuel:5000,category:"jet"},
a330:{name:"Airbus A330",img:"images/a330.jpg",capacity:300,range:13450,fuel:5500,category:"jet"},
boeing767:{name:"Boeing 767",img:"images/767.jpg",capacity:218,range:12200,fuel:4800,category:"jet"},

boeing777:{name:"Boeing 777",img:"images/777.jpg",capacity:396,range:15600,fuel:7000,category:"jet"},
a350:{name:"Airbus A350",img:"images/a350.jpg",capacity:350,range:15000,fuel:6500,category:"jet"},
boeing747:{name:"Boeing 747",img:"images/747.jpg",capacity:660,range:13800,fuel:11000,category:"jet"},

a380:{name:"Airbus A380",img:"images/a380.jpg",capacity:850,range:15200,fuel:12000,category:"jet"},

/* SMALL */
c172:{name:"Cessna 172",img:"images/c172.jpg",capacity:4,range:1289,fuel:200,category:"small"},
piperpa28:{name:"Piper PA-28",img:"images/pa28.jpg",capacity:4,range:1200,fuel:180,category:"small"},
bonanza:{name:"Beechcraft Bonanza",img:"images/bonanza.jpg",capacity:6,range:1700,fuel:300,category:"small"},

/* HELICOPTER */
uh60:{name:"UH-60 Black Hawk",img:"images/uh60.jpg",capacity:11,range:590,fuel:1200,category:"helicopter"},
ah64:{name:"AH-64 Apache",img:"images/ah64.jpg",capacity:2,range:480,fuel:1100,category:"helicopter"},
ch47:{name:"CH-47 Chinook",img:"images/ch47.jpg",capacity:55,range:740,fuel:2000,category:"helicopter"},
h145:{name:"Airbus H145",img:"images/h145.jpg",capacity:9,range:680,fuel:900,category:"helicopter"},
bell429:{name:"Bell 429",img:"images/bell429.jpg",capacity:7,range:760,fuel:850,category:"helicopter"},

/* CARGO */
c130:{name:"C-130 Hercules",img:"images/c130.jpg",capacity:92,range:3800,fuel:3000,category:"cargo"},
a330f:{name:"Airbus A330 Freighter",img:"images/a330f.jpg",capacity:70000,range:7400,fuel:5500,category:"cargo"},
boeing747f:{name:"Boeing 747 Freighter",img:"images/747f.jpg",capacity:140000,range:9800,fuel:11000,category:"cargo"},
an225:{name:"Antonov An-225",img:"images/an225.jpg",capacity:250000,range:15400,fuel:60000,category:"cargo"},

/* PRIVATE JETS */
g650:{name:"Gulfstream G650",img:"images/g650.jpg",capacity:18,range:12900,fuel:3000,category:"private"},
g700:{name:"Gulfstream G700",img:"images/g700.jpg",capacity:19,range:13500,fuel:3200,category:"private"},
global7500:{name:"Global 7500",img:"images/global7500.jpg",capacity:19,range:14260,fuel:3400,category:"private"},
phenom300:{name:"Embraer Phenom 300",img:"images/phenom300.jpg",capacity:10,range:3650,fuel:1200,category:"private"},

/* MILITARY */
f16:{name:"F-16 Fighting Falcon",img:"images/f16.jpg",capacity:1,range:4220,fuel:2700,category:"military"},
f22:{name:"F-22 Raptor",img:"images/f22.jpg",capacity:1,range:2960,fuel:3500,category:"military"},
f35:{name:"F-35 Lightning II",img:"images/f35.jpg",capacity:1,range:2200,fuel:3000,category:"military"},

/* SPECIAL */
concorde:{name:"Concorde",img:"images/concorde.jpg",capacity:92,range:7200,fuel:25000,category:"jet"}

};

/* fill */
function fillDropdown(list=data){

a1.innerHTML="";
a2.innerHTML="";

for(let k in list){
a1.innerHTML+=`<option value="${k}">${list[k].name}</option>`;
a2.innerHTML+=`<option value="${k}">${list[k].name}</option>`;
}

showDetail(a1.value);
}

/* filter */
function filterCategory(){

let cat=document.getElementById("categoryFilter").value;

let filtered={};

for(let k in data){
if(cat==="all" || data[k].category===cat){
filtered[k]=data[k];
}
}

fillDropdown(filtered);
}

/* detail */
function showDetail(k){
let a=data[k];
if(!a) return;

detail.innerHTML=`
<div class="box">
<img src="${a.img}">
<h2>${a.name}</h2>
<p>${a.capacity} pax</p>
<p>${a.range} km</p>
<p>${a.fuel} kg/h</p>
<p>${a.category}</p>
</div>`;
}

/* AI */
function aiExplain(a,b){
let t="Conclusion:\n";
t+=a.capacity>b.capacity?a.name+" carries more.\n":b.name+" carries more.\n";
t+=a.range>b.range?a.name+" has longer range.\n":b.name+" has longer range.\n";
t+=a.fuel<b.fuel?a.name+" is more efficient.\n":b.name+" is more efficient.\n";
return t;
}

/* compare */
function compare(){

let a=data[a1.value];
let b=data[a2.value];

if(!a || !b) return;

if(a.category!==b.category){
alert("⚠️ Same category only!");
return;
}

const maxCap=900;
const maxRange=16000;
const maxFuel=12000;

result.innerHTML=`
<div class="compare">

<div class="card">
<h3>${a.name}</h3>
<img src="${a.img}">

<p>${a.capacity} pax</p>
<div class="bar">
<div class="${a.capacity>b.capacity?'green':a.capacity<b.capacity?'red':'yellow'}"
style="width:${(a.capacity/maxCap)*100}%"></div>
</div>

<p>${a.range} km</p>
<div class="bar">
<div class="${a.range>b.range?'green':a.range<b.range?'red':'yellow'}"
style="width:${(a.range/maxRange)*100}%"></div>
</div>

<p>${a.fuel} kg/h</p>
<div class="bar">
<div class="${a.fuel<b.fuel?'green':a.fuel>b.fuel?'red':'yellow'}"
style="width:${(a.fuel/maxFuel)*100}%"></div>
</div>

</div>

<div class="card">
<h3>${b.name}</h3>
<img src="${b.img}">

<p>${b.capacity} pax</p>
<div class="bar">
<div class="${b.capacity>a.capacity?'green':b.capacity<a.capacity?'red':'yellow'}"
style="width:${(b.capacity/maxCap)*100}%"></div>
</div>

<p>${b.range} km</p>
<div class="bar">
<div class="${b.range>a.range?'green':b.range<a.range?'red':'yellow'}"
style="width:${(b.range/maxRange)*100}%"></div>
</div>

<p>${b.fuel} kg/h</p>
<div class="bar">
<div class="${b.fuel<a.fuel?'green':b.fuel>b.fuel?'red':'yellow'}"
style="width:${(b.fuel/maxFuel)*100}%"></div>
</div>

</div>

</div>`;

document.getElementById("aiBox").innerText = aiExplain(a,b);
}

/* sync */
a1.onchange=()=>showDetail(a1.value);
a2.onchange=()=>showDetail(a2.value);

/* init */
window.onload=()=>{
fillDropdown();
};

</script>

</body>
</html>
